name: Vehicle Search

on:
  schedule:
    # GitHub cron is UTC. Runs every 2 days (every odd day of the month).
    # Both target 7:00 AM Eastern; the Python DST guard lets only the correct
    # one actually send email (11 UTC = EDT summer, 12 UTC = EST winter).
    - cron: "0 11 */2 * *"
    - cron: "0 12 */2 * *"
  # Lets you press "Run workflow" for an instant run — no form to fill in.
  workflow_dispatch:

# Don't let two triggers (or a manual run + a cron) run at once.
concurrency:
  group: vehicle-search
  cancel-in-progress: false

permissions:
  contents: write   # needed to commit HTML/seen files back and deploy Pages

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 30   # a hung dealer probe can't burn your Actions minutes

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip   # speeds up repeat runs

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Run search
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          ENABLE_SCRAPE: "1"
          REQUEST_DELAY: "1.0"
          MAX_RETRIES: "2"
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python vehicle_search_automation.py

      - name: Upload HTML artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: search-results
          path: |
            gatineau_phev_rav4_search_results.html
            dealers.html
          retention-days: 7

      - name: Commit generated files back to main
        if: always()
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add gatineau_phev_rav4_search_results.html dealers.html seen_listings.json || true
          git commit -m "Update search results [skip ci]" || true
          git push || true

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          keep_files: true
