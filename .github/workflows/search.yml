name: Vehicle Search

on:
  schedule:
    # GitHub cron is UTC. Both target 7:00 AM Eastern; the Python DST guard lets only
    # the correct one actually send email (11 UTC = EDT, 12 UTC = EST).
    - cron: "0 11 5,8,11,14,17,20,23,26,29 * *"
    - cron: "0 12 5,8,11,14,17,20,23,26,29 * *"
  workflow_dispatch:
    # Optional overrides — leave blank to use the values hardcoded in the script.
    inputs:
      outlander_year_min:   { description: "Outlander min year", required: false, default: "" }
      outlander_year_max:   { description: "Outlander max year", required: false, default: "" }
      outlander_price_2022: { description: "Outlander 2022 max price (CAD)", required: false, default: "" }
      outlander_price_newer: { description: "Outlander 2023+ max price (CAD)", required: false, default: "" }
      outlander_mileage:    { description: "Outlander max mileage (km, all years)", required: false, default: "" }
      rav4_year_min:        { description: "RAV4 Prime min year", required: false, default: "" }
      rav4_year_max:        { description: "RAV4 Prime max year", required: false, default: "" }
      rav4_price:           { description: "RAV4 Prime max price (CAD)", required: false, default: "" }
      rav4_mileage:         { description: "RAV4 Prime max mileage (km)", required: false, default: "" }

# Don't let two triggers (or a manual run + a cron) run at once.
concurrency:
  group: vehicle-search
  cancel-in-progress: false

permissions:
  contents: write   # needed to commit HTML/seen files back and deploy Pages

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 30   # a hung dealer probe can't burn your Actions minutes

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip   # speeds up repeat runs

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Run search
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          ENABLE_SCRAPE: "1"
          REQUEST_DELAY: "1.0"
          MAX_RETRIES: "2"
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          # Criteria overrides from the manual-run inputs (blank on scheduled runs).
          OUTLANDER_YEAR_MIN: ${{ github.event.inputs.outlander_year_min }}
          OUTLANDER_YEAR_MAX: ${{ github.event.inputs.outlander_year_max }}
          OUTLANDER_PRICE_2022: ${{ github.event.inputs.outlander_price_2022 }}
          OUTLANDER_PRICE_NEWER: ${{ github.event.inputs.outlander_price_newer }}
          OUTLANDER_MILEAGE: ${{ github.event.inputs.outlander_mileage }}
          RAV4_YEAR_MIN: ${{ github.event.inputs.rav4_year_min }}
          RAV4_YEAR_MAX: ${{ github.event.inputs.rav4_year_max }}
          RAV4_PRICE: ${{ github.event.inputs.rav4_price }}
          RAV4_MILEAGE: ${{ github.event.inputs.rav4_mileage }}
        run: python vehicle_search_automation.py

      - name: Upload HTML artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: search-results
          path: |
            gatineau_phev_rav4_search_results.html
            dealers.html
          retention-days: 7

      - name: Commit generated files back to main
        if: always()
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add gatineau_phev_rav4_search_results.html dealers.html seen_listings.json || true
          git commit -m "Update search results [skip ci]" || true
          git push || true

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          keep_files: true
