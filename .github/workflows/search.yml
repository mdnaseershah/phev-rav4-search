name: Vehicle Search

on:
  schedule:
    # GitHub cron is UTC. Both fire daily, targeting 8:30 AM Eastern year-round.
    # The Python guard (8-11 AM Eastern window + once-per-day via run_state.json)
    # lets only ONE actually send email:
    #   12:30 UTC = 8:30 AM EDT (summer, UTC-4)
    #   13:30 UTC = 8:30 AM EST (winter, UTC-5)
    - cron: "30 12 * * *"
    - cron: "30 13 * * *"
  workflow_dispatch:

# Don't let two triggers (or a manual run + a cron) run at once.
concurrency:
  group: vehicle-search
  cancel-in-progress: false

permissions:
  contents: write   # needed to commit HTML/seen files back and deploy Pages

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 30   # a hung dealer probe can't burn your Actions minutes

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip   # speeds up repeat runs

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Run search
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          ENABLE_SCRAPE: "1"
          REQUEST_DELAY: "1.0"
          MAX_RETRIES: "2"
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python vehicle_search_automation.py

      - name: Upload HTML artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: search-results
          path: |
            gatineau_phev_rav4_search_results.html
            dealers.html
          retention-days: 7

      - name: Commit generated files back to main
        if: always()
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add gatineau_phev_rav4_search_results.html dealers.html seen_listings.json run_state.json || true
          git commit -m "Update search results [skip ci]" || true
          git push || true

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          keep_files: true
