name: Vehicle Search

on:
  schedule:
    # GOAL: one automatic email per day, landing around 8:30 AM Eastern. GitHub runs
    # these scheduled jobs consistently ~1.5–2 HOURS LATE, so we deliberately TARGET
    # ~6:30 AM Eastern — the delay then lands the email around 8:30 AM. If the first
    # attempt doesn't succeed, a few MORNING RETRIES cover for it, then we stop by
    # midday (the user chose "morning only" — a tidier run list, no afternoon retries).
    #
    # GitHub cron is UTC-only (can't follow DST) and scheduled runs are best-effort:
    # routinely delayed and occasionally dropped. GitHub's queue is most congested at
    # "round" minutes (:00 and :30), so we use the OFF-PEAK minute :37. We fire the
    # ~6:30 AM primary in BOTH seasons plus four hourly morning retries. The Python
    # guard (6 AM–10 PM Eastern window + record-only-on-successful-send) makes sure
    # exactly ONE email goes out: the first trigger that both lands in-window AND
    # manages to send records the day; every later trigger sees that and skips. A
    # trigger that fails to send does NOT record the day, so the next one retries.
    #
    # Eastern time each cron targets (EDT summer = UTC-4, EST winter = UTC-5):
    #   10:37 UTC -> 6:37 EDT (summer primary) / 5:37 EST (winter: rejected, too early)
    #   11:37 UTC -> 7:37 EDT / 6:37 EST (winter primary)
    #   12:37 UTC -> 8:37 EDT / 7:37 EST    } morning retries, in case GitHub delayed the
    #   13:37 UTC -> 9:37 EDT / 8:37 EST    } earlier ones or a send failed. Each is a
    #   14:37 UTC -> 10:37 EDT / 9:37 EST   } ~30s no-op once the day's email is out.
    - cron: "37 10 * * *"
    - cron: "37 11 * * *"
    - cron: "37 12 * * *"
    - cron: "37 13 * * *"
    - cron: "37 14 * * *"
  workflow_dispatch:

# Don't let two triggers (or a manual run + a cron) run at once.
concurrency:
  group: vehicle-search
  cancel-in-progress: false

permissions:
  contents: write   # needed to commit HTML/seen files back and deploy Pages

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 30   # a hung dealer probe can't burn your Actions minutes

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip   # speeds up repeat runs

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Run search
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          ENABLE_SCRAPE: "1"
          REQUEST_DELAY: "1.0"
          MAX_RETRIES: "2"
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python vehicle_search_automation.py

      - name: Upload HTML artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: search-results
          path: |
            outlander_phev_search_results.html
            outlander_phev_search_results.xlsx
            dealers.html
          retention-days: 7

      - name: Commit generated files back to main
        if: always()
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add outlander_phev_search_results.html dealers.html seen_listings.json run_state.json || true
          git commit -m "Update search results [skip ci]" || true
          git push || true

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          keep_files: true
