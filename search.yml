name: Vehicle Search Automation

on:
  schedule:
    # 11:00 UTC = 7:00 AM EDT (summer)
    - cron: '0 11 5,8,11,14,17,20,23,26,29 * *'
    # 12:00 UTC = 7:00 AM EST (winter)
    - cron: '0 12 5,8,11,14,17,20,23,26,29 * *'
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run script
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          ENABLE_SCRAPE: '1'
          REQUEST_DELAY: '1.0'
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python vehicle_search_automation.py

      - name: Upload HTML results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: search-results
          path: |
            gatineau_phev_rav4_search_results.html
            dealers.html
          retention-days: 7

      - name: Commit generated HTML files back to repo
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add gatineau_phev_rav4_search_results.html dealers.html
          git diff --staged --quiet || git commit -m "Auto-update search results [skip ci]"
          git push || true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          keep_files: true
