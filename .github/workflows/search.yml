name: Vehicle Search

on:
  schedule:
    # GOAL: one automatic email per day, targeted at 8:30 AM Eastern, and if that
    # attempt doesn't succeed, RETRY every hour through the day until one sends.
    #
    # GitHub cron is UTC-only (can't follow DST) and scheduled runs are routinely
    # delayed — observed ~3 HOURS late — or occasionally dropped. So we fire the
    # 8:30 AM primary in BOTH seasons plus hourly retries all afternoon. The Python
    # guard (8 AM–10 PM Eastern window + record-only-on-successful-send) makes sure
    # exactly ONE email goes out: the first trigger that both lands in-window AND
    # manages to send records the day; every later trigger sees that and skips. A
    # trigger that fails to send does NOT record the day, so the next hour retries.
    #
    # Eastern time each cron targets (EDT summer = UTC-4, EST winter = UTC-5):
    #   12:30 UTC -> 8:30 EDT (summer primary) / 7:30 EST (winter: rejected, too early)
    #   13:30 UTC -> 9:30 EDT / 8:30 EST (winter primary)
    #   14:30 UTC -> 10:30 EDT / 9:30 EST   } hourly retries through the day, in case
    #   15:30 UTC -> 11:30 EDT / 10:30 EST  } GitHub delayed the earlier ones or a send
    #   16:30 UTC -> 12:30 EDT / 11:30 EST  } failed. Each is a ~30s no-op once the day's
    #   17:30 UTC ->  1:30 EDT / 12:30 EST  } email has already gone out.
    #   18:30 UTC ->  2:30 EDT /  1:30 EST
    #   19:30 UTC ->  3:30 EDT /  2:30 EST
    #   20:30 UTC ->  4:30 EDT /  3:30 EST
    #   21:30 UTC ->  5:30 EDT /  4:30 EST
    - cron: "30 12 * * *"
    - cron: "30 13 * * *"
    - cron: "30 14 * * *"
    - cron: "30 15 * * *"
    - cron: "30 16 * * *"
    - cron: "30 17 * * *"
    - cron: "30 18 * * *"
    - cron: "30 19 * * *"
    - cron: "30 20 * * *"
    - cron: "30 21 * * *"
  workflow_dispatch:

# Don't let two triggers (or a manual run + a cron) run at once.
concurrency:
  group: vehicle-search
  cancel-in-progress: false

permissions:
  contents: write   # needed to commit HTML/seen files back and deploy Pages

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 30   # a hung dealer probe can't burn your Actions minutes

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip   # speeds up repeat runs

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Run search
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          ENABLE_SCRAPE: "1"
          REQUEST_DELAY: "1.0"
          MAX_RETRIES: "2"
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python vehicle_search_automation.py

      - name: Upload HTML artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: search-results
          path: |
            outlander_phev_search_results.html
            outlander_phev_search_results.xlsx
            dealers.html
          retention-days: 7

      - name: Commit generated files back to main
        if: always()
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add outlander_phev_search_results.html dealers.html seen_listings.json run_state.json || true
          git commit -m "Update search results [skip ci]" || true
          git push || true

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          keep_files: true
