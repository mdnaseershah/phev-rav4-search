name: Daily Vehicle Search

on:
  schedule:
    # 11:00 UTC = 7 AM EST (Standard Time)
    - cron: '0 11 5,8,11,14,17,20,23,26,29 * *'
    # 12:00 UTC = 7 AM EDT (Daylight Time)
    - cron: '0 12 5,8,11,14,17,20,23,26,29 * *'
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run script
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          ENABLE_SCRAPE: '1'
        run: python vehicle_search_automation.py
