name: Weekly Vehicle Search

# Allow scheduled runs and manual trigger
on:
  schedule:
    # GitHub Actions cron runs in UTC and has no timezone/DST awareness, so
    # two triggers are used to hit 7:00 AM Gatineau (US/Eastern) time
    # year-round. vehicle_search_automation.py checks the real Eastern time
    # at runtime and skips whichever of these two does not correspond to
    # 7 AM locally, so only one of them actually sends the email.
    - cron: '0 11 5,8,11,14,17,20,23,26,29 * *'  # 7:00 AM Eastern Daylight Time (UTC-4)
    - cron: '0 12 5,8,11,14,17,20,23,26,29 * *'  # 7:00 AM Eastern Standard Time (UTC-5)
  workflow_dispatch:

# Grant the workflow explicit write permission to repository contents
permissions:
  contents: write

jobs:
  search-and-email:
    runs-on: ubuntu-latest
    env:
      ENABLE_SCRAPE: '1'
      REQUEST_DELAY: '1.0'
      VIEW_DEALERS_URL: ${{ vars.VIEW_DEALERS_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # keep credentials so actions can push
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run vehicle search automation
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          ENABLE_SCRAPE: ${{ env.ENABLE_SCRAPE }}
          REQUEST_DELAY: ${{ env.REQUEST_DELAY }}
          VIEW_DEALERS_URL: ${{ env.VIEW_DEALERS_URL }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          python vehicle_search_automation.py
      - name: Upload results (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: search-results
          path: |
            gatineau_phev_rav4_search_results.html
            dealers.html
          retention-days: 30

      - name: Commit generated HTML back to repo (safe, non-failing)
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add gatineau_phev_rav4_search_results.html dealers.html || true
          git commit -m "Weekly search results - $(date '+%Y-%m-%d')" || true
          git push || true
      - name: Deploy generated HTML to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./ # generated files are in repo root
          keep_files: true
